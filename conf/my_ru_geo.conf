[General]

bypass-system = true

ipv6 = false

prefer-ipv6 = false

private-ip-answer = true

dns-direct-system = false

dns-fallback-system = false

dns-direct-fallback-proxy = true

# dns-server = tls://1.1.1.2:853,tls://1.0.0.2:853,https://security.cloudflare-dns.com/dns-query,1.1.1.2,1.0.0.2,tls://8.8.8.8:853,tls://8.8.4.4:853,https://dns.google/dns-query,8.8.8.8,8.8.4.4
